#cloud-config
package_update: true
package_upgrade: false

packages:
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - ufw
  - git
%{ if install_host_nginx_certbot ~}
  - nginx
  - certbot
  - python3-certbot-nginx
%{ endif ~}
%{ if install_java ~}
  - default-jre
%{ endif ~}

write_files:
  - path: /opt/walks-server/.env.example
    permissions: "0600"
    content: |
      # App config
      CONTENTFUL_SPACE_ID=change-me
      CONTENTFUL_ACCESS_TOKEN=change-me
      CONTENTFUL_ENVIRONMENT=master
      CONTENTFUL_DEFAULT_LOCALE=en-US

      # HTTPS / Nginx
      DOMAIN=${domain}
      CERTBOT_EMAIL=admin@${domain}

      # Image to deploy (set by CI/CD)
      APP_IMAGE=fra.ocir.io/your_tenancy_namespace/walks-server
      APP_TAG=latest

  - path: /etc/systemd/system/walks-server.service
    permissions: "0644"
    content: |
      [Unit]
      Description=Walks Server (Docker Compose)
      Wants=network-online.target docker.service
      After=network-online.target docker.service
      ConditionPathExists=/opt/walks-server/.env
      ConditionPathExists=/opt/walks-server/ops/docker-compose.prod.yml

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      WorkingDirectory=/opt/walks-server/ops
      ExecStart=/usr/bin/env sh -lc 'docker compose -f docker-compose.prod.yml --env-file /opt/walks-server/.env up -d --remove-orphans'
      ExecStop=/usr/bin/env sh -lc 'docker compose -f docker-compose.prod.yml --env-file /opt/walks-server/.env down'

      [Install]
      WantedBy=multi-user.target

runcmd:
  - mkdir -p /opt/walks-server
  - mkdir -p /opt/walks-server/ops

  # UFW: allow SSH/HTTP/HTTPS and enable firewall.
  - ufw allow OpenSSH
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable

  # Install Docker Engine + Compose v2 plugin (Ubuntu).
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - chmod a+r /etc/apt/keyrings/docker.gpg
  - >
    sh -lc 'echo
    "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg]
    https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable"
    > /etc/apt/sources.list.d/docker.list'
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable --now docker

  # Enable compose-based service on boot (will no-op until /opt/walks-server/.env exists)
  - systemctl daemon-reload
  - systemctl enable walks-server.service
