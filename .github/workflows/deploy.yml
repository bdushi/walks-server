name: Build and Deploy (OCI VM + Docker Compose)

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to OCIR
        env:
          OCIR_REGISTRY: ${{ secrets.OCIR_REGISTRY }} # e.g. fra.ocir.io
          OCIR_USERNAME: ${{ secrets.OCIR_USERNAME }} # e.g. tenancy_namespace/your.user (or full federated username)
          OCIR_PASSWORD: ${{ secrets.OCIR_PASSWORD }} # OCI Auth Token
        run: |
          echo "$OCIR_PASSWORD" | docker login "$OCIR_REGISTRY" -u "$OCIR_USERNAME" --password-stdin

      - name: Build and push image
        env:
          OCIR_REGISTRY: ${{ secrets.OCIR_REGISTRY }}
          OCIR_REPOSITORY: ${{ secrets.OCIR_REPOSITORY }} # e.g. tenancy_namespace/walks-server
        run: |
          IMAGE="$OCIR_REGISTRY/$OCIR_REPOSITORY"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag "$IMAGE:${GITHUB_SHA}" \
            --tag "$IMAGE:latest" \
            --push \
            .

      - name: Prepare SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ORACLE_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add host key
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
        run: |
          ssh-keyscan -H "$ORACLE_HOST" >> ~/.ssh/known_hosts

      - name: Upload ops bundle
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
        run: |
          ssh "${ORACLE_USER}@${ORACLE_HOST}" "mkdir -p /opt/walks-server/ops"
          scp -r ops/. "${ORACLE_USER}@${ORACLE_HOST}:/opt/walks-server/ops/"

      - name: Deploy on VM
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          OCIR_REGISTRY: ${{ secrets.OCIR_REGISTRY }}
          OCIR_USERNAME: ${{ secrets.OCIR_USERNAME }}
          OCIR_PASSWORD: ${{ secrets.OCIR_PASSWORD }}
          OCIR_REPOSITORY: ${{ secrets.OCIR_REPOSITORY }}
        run: |
          IMAGE="$OCIR_REGISTRY/$OCIR_REPOSITORY"
          ssh "${ORACLE_USER}@${ORACLE_HOST}" "set -eu
            mkdir -p /opt/walks-server
            mkdir -p /opt/walks-server/ops/data/letsencrypt /opt/walks-server/ops/data/certbot-www
            if [ ! -f /opt/walks-server/.env ]; then
              echo 'Missing /opt/walks-server/.env on server. Create it from ops/.env.example.' >&2
              exit 1
            fi
            set -a; . /opt/walks-server/.env; set +a
            echo '${OCIR_PASSWORD}' | docker login '${OCIR_REGISTRY}' -u '${OCIR_USERNAME}' --password-stdin
            cd /opt/walks-server/ops
            # Ensure nginx can start even before the first real Let's Encrypt issuance.
            if ! test -f \"/opt/walks-server/ops/data/letsencrypt/live/\$DOMAIN/fullchain.pem\"; then
              docker run --rm -v /opt/walks-server/ops/data/letsencrypt:/etc/letsencrypt alpine:3.20 sh -c \"
                set -eu
                apk add --no-cache openssl >/dev/null
                mkdir -p /etc/letsencrypt/live/\$DOMAIN
                openssl req -x509 -nodes -newkey rsa:2048 -days 1 \
                  -keyout /etc/letsencrypt/live/\$DOMAIN/privkey.pem \
                  -out /etc/letsencrypt/live/\$DOMAIN/fullchain.pem \
                  -subj /CN=\$DOMAIN >/dev/null 2>&1
              \"
            fi
            APP_IMAGE='${IMAGE}' APP_TAG='${GITHUB_SHA}' docker compose -f docker-compose.prod.yml --env-file /opt/walks-server/.env pull
            APP_IMAGE='${IMAGE}' APP_TAG='${GITHUB_SHA}' docker compose -f docker-compose.prod.yml --env-file /opt/walks-server/.env up -d --remove-orphans
          "
