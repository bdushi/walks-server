name: Build and Deploy (OCI VM + Docker Compose)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate OCIR settings
        env:
          OCIR_REGISTRY: ${{ secrets.OCIR_REGISTRY }} # e.g. nrq.ocir.io (eu-turin-1 / Italy North)
          OCIR_USERNAME: ${{ secrets.OCIR_USERNAME }} # must be <tenancy-namespace>/<user>
          OCIR_PASSWORD: ${{ secrets.OCIR_PASSWORD }} # OCI Auth Token
          OCIR_REPOSITORY: ${{ secrets.OCIR_REPOSITORY }} # e.g. <tenancy-namespace>/walks-server
        run: |
          set -eu

          if [ -z "${OCIR_REGISTRY:-}" ] || [ -z "${OCIR_USERNAME:-}" ] || [ -z "${OCIR_PASSWORD:-}" ] || [ -z "${OCIR_REPOSITORY:-}" ]; then
            echo "Missing one or more required secrets: OCIR_REGISTRY, OCIR_USERNAME, OCIR_PASSWORD, OCIR_REPOSITORY" >&2
            exit 1
          fi

          case "$OCIR_REGISTRY" in
            *.ocir.io) ;;
            *)
              echo "OCIR_REGISTRY must look like <region-key>.ocir.io (example: nrq.ocir.io)" >&2
              exit 1
              ;;
          esac

          case "$OCIR_USERNAME" in
            */*) ;;
            *)
              echo "OCIR_USERNAME must be in the form <tenancy-namespace>/<user> (example: mynamespace/my.user)" >&2
              exit 1
              ;;
          esac

          case "$OCIR_REPOSITORY" in
            */*) ;;
            *)
              echo "OCIR_REPOSITORY must be in the form <tenancy-namespace>/<repo> (example: mynamespace/walks-server)" >&2
              exit 1
              ;;
          esac

          ns_user="${OCIR_USERNAME%%/*}"
          ns_repo="${OCIR_REPOSITORY%%/*}"
          if [ "$ns_user" != "$ns_repo" ]; then
            echo "Namespace mismatch: OCIR_USERNAME starts with '$ns_user' but OCIR_REPOSITORY starts with '$ns_repo'." >&2
            echo "For OCIR, both must use your tenancy namespace (often not the same as the tenancy display name)." >&2
            exit 1
          fi

      - name: Login to OCIR
        env:
          OCIR_REGISTRY: ${{ secrets.OCIR_REGISTRY }} # e.g. nrq.ocir.io (eu-turin-1 / Italy North)
          OCIR_USERNAME: ${{ secrets.OCIR_USERNAME }} # e.g. brunodushi/your.user (or full federated username)
          OCIR_PASSWORD: ${{ secrets.OCIR_PASSWORD }} # OCI Auth Token
        run: |
          echo "$OCIR_PASSWORD" | docker login "$OCIR_REGISTRY" -u "$OCIR_USERNAME" --password-stdin

      - name: Build and push image
        env:
          OCIR_REGISTRY: ${{ secrets.OCIR_REGISTRY }}
          OCIR_REPOSITORY: ${{ secrets.OCIR_REPOSITORY }} # e.g. brunodushi/walks-server
        run: |
          IMAGE="$OCIR_REGISTRY/$OCIR_REPOSITORY"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag "$IMAGE:${GITHUB_SHA}" \
            --tag "$IMAGE:latest" \
            --push \
            .

      - name: Prepare SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ORACLE_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add host key
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
        run: |
          if [ -z "${ORACLE_HOST:-}" ]; then
            echo "Missing required secret: ORACLE_HOST" >&2
            exit 1
          fi
          case "$ORACLE_HOST" in
            http://*|https://*|*@*|*/*)
              echo "ORACLE_HOST must be a plain hostname or IP (example: 203.0.113.10). Do not include user@, protocol, or path." >&2
              exit 1
              ;;
          esac

          # Help debug connectivity issues (NSG/Security List / wrong IP / VM down).
          if command -v nc >/dev/null 2>&1; then
            nc -z -w 5 "$ORACLE_HOST" 22 || true
          fi

          # Populate known_hosts; retry a couple times because keyscan can be flaky on cold hosts.
          for i in 1 2 3; do
            if ssh-keyscan -T 10 -H "$ORACLE_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Failed to reach $ORACLE_HOST:22 to fetch host key (ssh-keyscan). Check the VM is up, ORACLE_HOST is correct, and port 22 is open in OCI NSG/Security List." >&2
          exit 1

      - name: Upload ops bundle
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
        run: |
          set -eu

          # Upload into a user-writable staging dir, then promote into /opt with sudo.
          # This avoids requiring ORACLE_USER to own /opt/walks-server/ops.
          REMOTE_STAGING="/tmp/walks-server-ops-${GITHUB_SHA}"

          ssh "${ORACLE_USER}@${ORACLE_HOST}" "set -eu
            sudo -n true >/dev/null 2>&1 || { echo 'ORACLE_USER must have passwordless sudo for deployment.' >&2; exit 1; }
            rm -rf \"$REMOTE_STAGING\"
            mkdir -p \"$REMOTE_STAGING\"
          "

          scp -r ops/. "${ORACLE_USER}@${ORACLE_HOST}:${REMOTE_STAGING}/"

          ssh "${ORACLE_USER}@${ORACLE_HOST}" "set -eu
            sudo mkdir -p /opt/walks-server/ops
            if command -v rsync >/dev/null 2>&1; then
              sudo rsync -a --no-owner --no-group \"$REMOTE_STAGING\"/ /opt/walks-server/ops/
            else
              sudo cp -r \"$REMOTE_STAGING\"/. /opt/walks-server/ops/
            fi
            # Backward-compat: older deploys left nginx's stock template name in place.
            # We intentionally do not ship that file anymore because it won't overwrite
            # the image's baked-in /etc/nginx/conf.d/default.conf.
            sudo rm -f /opt/walks-server/ops/nginx/templates/default.conf.template
            rm -rf \"$REMOTE_STAGING\"
          "

      - name: Fix entrypoint script permissions
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
        run: |
          ssh "${ORACLE_USER}@${ORACLE_HOST}" \
            "sudo chmod +x /opt/walks-server/ops/nginx/docker-entrypoint.d/*.sh"

      - name: Ensure server .env exists
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          WALKS_DOMAIN: ${{ secrets.WALKS_DOMAIN }}
          WALKS_CERTBOT_EMAIL: ${{ secrets.WALKS_CERTBOT_EMAIL }}
          CONTENTFUL_GRAPHQL_URL: ${{ secrets.WALKS_CONTENTFUL_GRAPHQL_URL }}
          CONTENTFUL_SPACE_ID: ${{ secrets.WALKS_CONTENTFUL_SPACE_ID }}
          CONTENTFUL_ACCESS_TOKEN: ${{ secrets.WALKS_CONTENTFUL_ACCESS_TOKEN }}
        run: |
          set -eu

          # If the server env already exists, keep it as-is (single source of truth remains the VM).
          if ssh "${ORACLE_USER}@${ORACLE_HOST}" "test -f /opt/walks-server/.env"; then
            exit 0
          fi

          if [ -z "${WALKS_DOMAIN:-}" ] || [ -z "${WALKS_CERTBOT_EMAIL:-}" ] || [ -z "${CONTENTFUL_SPACE_ID:-}" ] || [ -z "${CONTENTFUL_ACCESS_TOKEN:-}" ]; then
            echo "Missing one or more required secrets to create /opt/walks-server/.env:" >&2
            echo "  WALKS_DOMAIN, WALKS_CERTBOT_EMAIL, WALKS_CONTENTFUL_SPACE_ID, WALKS_CONTENTFUL_ACCESS_TOKEN" >&2
            echo "Alternatively, create /opt/walks-server/.env manually on the VM (see ops/.env.example)." >&2
            exit 1
          fi

          # Pre-create file with correct owner/perms so the deploy user can read it later.
          ssh "${ORACLE_USER}@${ORACLE_HOST}" "set -eu
            sudo mkdir -p /opt/walks-server
            sudo chmod 755 /opt/walks-server
            sudo install -o \"${ORACLE_USER}\" -g \"${ORACLE_USER}\" -m 600 /dev/null /opt/walks-server/.env
          "

          # Write the env file without echoing secrets back into logs.
          {
            printf 'CONTENTFUL_GRAPHQL_URL=%s\n' "${CONTENTFUL_GRAPHQL_URL:-https://graphql.contentful.com/content/v1/spaces/}"
            printf 'CONTENTFUL_SPACE_ID=%s\n' "$CONTENTFUL_SPACE_ID"
            printf 'CONTENTFUL_ACCESS_TOKEN=%s\n' "$CONTENTFUL_ACCESS_TOKEN"
            printf 'CONTENTFUL_ENVIRONMENT=master\n'
            printf 'CONTENTFUL_DEFAULT_LOCALE=en-US\n'
            printf 'DOMAIN=%s\n' "$WALKS_DOMAIN"
            printf 'CERTBOT_EMAIL=%s\n' "$WALKS_CERTBOT_EMAIL"
          } | ssh "${ORACLE_USER}@${ORACLE_HOST}" "sudo tee /opt/walks-server/.env >/dev/null"

      - name: Deploy on VM
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          OCIR_REGISTRY: ${{ secrets.OCIR_REGISTRY }}
          OCIR_USERNAME: ${{ secrets.OCIR_USERNAME }}
          OCIR_PASSWORD: ${{ secrets.OCIR_PASSWORD }}
          OCIR_REPOSITORY: ${{ secrets.OCIR_REPOSITORY }}
        run: |
          IMAGE="$OCIR_REGISTRY/$OCIR_REPOSITORY"
          if [ -z "${ORACLE_HOST:-}" ] || [ -z "${ORACLE_USER:-}" ]; then
            echo "Missing required secrets: ORACLE_HOST and/or ORACLE_USER" >&2
            exit 1
          fi

          # Login to OCIR on the VM. Pass the auth token via stdin so we don't fight shell quoting.
          printf '%s' "$OCIR_PASSWORD" | ssh "${ORACLE_USER}@${ORACLE_HOST}" \
            "sudo docker login \"$OCIR_REGISTRY\" -u \"$OCIR_USERNAME\" --password-stdin"

          # Deploy the stack on the VM.
          ssh "${ORACLE_USER}@${ORACLE_HOST}" "set -eu
            sudo mkdir -p /opt/walks-server
            sudo mkdir -p /opt/walks-server/ops/data/letsencrypt /opt/walks-server/ops/data/certbot-www
            if [ ! -f /opt/walks-server/.env ]; then
              echo 'Missing /opt/walks-server/.env on server.' >&2
              echo 'On the VM, create it from the uploaded template:' >&2
              echo '  sudo mkdir -p /opt/walks-server' >&2
              echo '  sudo cp /opt/walks-server/ops/.env.example /opt/walks-server/.env' >&2
              echo '  sudo nano /opt/walks-server/.env' >&2
              echo 'Then set at least: DOMAIN, CERTBOT_EMAIL, CONTENTFUL_SPACE_ID, CONTENTFUL_ACCESS_TOKEN.' >&2
              exit 1
            fi
            set -a; . /opt/walks-server/.env; set +a
            cd /opt/walks-server/ops
            # Ensure nginx can start even before the first real Let's Encrypt issuance.
            if ! test -f \"/opt/walks-server/ops/data/letsencrypt/live/\$DOMAIN/fullchain.pem\"; then
              sudo docker run --rm -v /opt/walks-server/ops/data/letsencrypt:/etc/letsencrypt alpine:3.20 sh -c \"
                set -eu
                apk add --no-cache openssl >/dev/null
                mkdir -p /etc/letsencrypt/live/\$DOMAIN
                openssl req -x509 -nodes -newkey rsa:2048 -days 1 \
                  -keyout /etc/letsencrypt/live/\$DOMAIN/privkey.pem \
                  -out /etc/letsencrypt/live/\$DOMAIN/fullchain.pem \
                  -subj /CN=\$DOMAIN >/dev/null 2>&1
              \"
            fi
            sudo APP_IMAGE=\"$IMAGE\" APP_TAG=\"$GITHUB_SHA\" docker compose -f docker-compose.prod.yml --env-file /opt/walks-server/.env pull
            sudo APP_IMAGE=\"$IMAGE\" APP_TAG=\"$GITHUB_SHA\" docker compose -f docker-compose.prod.yml --env-file /opt/walks-server/.env up -d --remove-orphans
          "
